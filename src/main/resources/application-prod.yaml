spring:
  application:
    name: caixaverso-minierp-prod

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Datasource - PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/caixaverso
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false

# Server
server:
  port: 8096
  servlet:
    context-path: /api

# Logging
logging:
  level:
    root: WARN
    com.caixaverso.minierp: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/caixaverso.log
    max-size: 10MB
    max-history: 30

# Application Custom Properties
caixaverso:
  saga:
    enabled: true
    timeout-seconds: 300
    retry-attempts: 3

  api-gateway:
    enabled: true
    rate-limit: 1000
    rate-limit-window-minutes: 1

