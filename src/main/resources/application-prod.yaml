spring:
  application:
    name: caixaverso-minierp-prod

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Datasource - PostgreSQL (usa variáveis de ambiente do docker-compose)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/caixaverso}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api

# Spring Actuator - expõe /actuator/health sem autenticação
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  server:
    port: 8080

# Logging
logging:
  level:
    root: WARN
    com.caixaverso.minierp: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/caixaverso.log
    max-size: 10MB
    max-history: 30

# Application Custom Properties
caixaverso:
  saga:
    enabled: true
    timeout-seconds: 300
    retry-attempts: 3

  api-gateway:
    enabled: true
    rate-limit: 1000
    rate-limit-window-minutes: 1

# SpringDoc OpenAPI / Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false
  packages-to-scan: com.caixaverso.minierp
