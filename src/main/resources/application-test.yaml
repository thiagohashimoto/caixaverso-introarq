spring:
  application:
    name: caixaverso-minierp-test

  # JPA/Hibernate - H2 para testes
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Datasource - H2 In-Memory
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

# Server
server:
  port: 8081
  servlet:
    context-path: /api

# Logging para testes
logging:
  level:
    root: WARN
    com.caixaverso.minierp: DEBUG
    org.springframework.test: INFO
    org.springframework.boot.test: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Application Custom Properties
caixaverso:
  saga:
    enabled: false
    timeout-seconds: 10
    retry-attempts: 1

  api-gateway:
    enabled: false
    rate-limit: 1000
    rate-limit-window-minutes: 1
