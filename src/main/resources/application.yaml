spring:
  application:
    name: caixaverso-minierp

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Datasource - H2 File-Based (Persistente)
  datasource:
    url: jdbc:h2:file:./data/caixaverso;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson - JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # Web - Content negotiation
  web:
    resources:
      add-mappings: false

  # MVC
  mvc:
    content-negotiation:
      favor-parameter: false
      favor-path-extension: false
      use-suffix-pattern: false

# Server
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Logging
logging:
  level:
    root: INFO
    com.caixaverso.minierp: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Application Custom Properties
caixaverso:
  saga:
    enabled: true
    timeout-seconds: 300
    retry-attempts: 3

  api-gateway:
    enabled: true
    rate-limit: 100
    rate-limit-window-minutes: 1

# Spring Actuator - expõe /actuator/health
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

