# ============================================================
# Nginx Configuration - CaixaVerso MiniERP
# Reverse Proxy com Segurança, Performance e Controle de Tráfego
# ============================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Oculta versão do Nginx (segurança)
    server_tokens off;

    # ============================================================
    # 3.6 LOG ESTRUTURADO
    # Registra: IP, método, status, tempo de resposta do upstream
    # ============================================================
    log_format structured '$remote_addr [$time_local] '
                          '"$request_method $request_uri $server_protocol" '
                          '$status $body_bytes_sent '
                          'rt=$request_time '
                          'uct="$upstream_connect_time" '
                          'urt="$upstream_response_time" '
                          '"$http_user_agent"';

    access_log /var/log/nginx/access.log structured;
    error_log  /var/log/nginx/error.log warn;

    # ============================================================
    # PERFORMANCE
    # ============================================================
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 100;

    # ============================================================
    # 3.4 LIMITE DE PAYLOAD - Máximo 1MB por requisição
    # ============================================================
    client_max_body_size 1m;

    # ============================================================
    # 3.5 COMPRESSÃO GZIP
    # Ativa para application/json e text/plain (e demais tipos úteis)
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1;
    gzip_http_version 1.0;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/vnd.spring-boot.actuator.v3+json;
    gzip_disable "msie6";

    # ============================================================
    # 3.3 RATE LIMITING
    # Máximo 5 req/s, burst de 10 — retorna 429 (Too Many Requests)
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # ============================================================
    # 4.1 CACHE DE GET (10 segundos, sem autenticação)
    # ============================================================
    proxy_cache_path /var/cache/nginx/cache levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=10s use_temp_path=off;

    # ============================================================
    # 4 UPSTREAM - Backend Spring Boot
    # ============================================================
    upstream minierp_backend {
        least_conn;
        server minierp:8080 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ============================================================
    # 3.1 SERVIDOR HTTP (porta 80)
    # Encaminha requisições para a API Spring Boot via proxy reverso
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        # Limit de conexões por IP
        limit_conn conn_limit 20;

        # ============================================================
        # 3.2 HEADERS DE SEGURANÇA (obrigatórios)
        # ============================================================
        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-Frame-Options         "DENY"           always;
        add_header X-XSS-Protection        "1; mode=block"  always;

        # ============================================================
        # Health check do Nginx (não encaminha para backend)
        # ============================================================
        location /health {
            add_header Content-Type "text/plain" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            return 200 "healthy\n";
        }

        # ============================================================
        # 4.2 BASIC AUTH - Protege apenas o Actuator
        # ============================================================
        location ~ ^/api/actuator(/.*)?$ {
            auth_basic           "Area Restrita";
            auth_basic_user_file /etc/nginx/.htpasswd;

            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://minierp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header Connection         "";

            proxy_buffering     on;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }

        # ============================================================
        # Swagger UI e API Docs - sem Basic Auth (browser precisa buscar
        # recursos JS/CSS e swagger-config sem credenciais)
        # ============================================================
        location ~ ^/api/(swagger-ui\.html|swagger-ui|v3/api-docs|swagger-resources|webjars)(/.*)?$ {
            limit_req zone=api_limit burst=10 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;

            proxy_pass http://minierp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_set_header Connection         "";

            proxy_buffering     on;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }

        # ============================================================
        # 3.3 RATE LIMITING + 3.1 PROXY - Endpoints da API
        # ============================================================
        location /api/ {
            # 3.3 Rate Limiting: 5r/s, burst=10
            limit_req zone=api_limit burst=10 nodelay;

            # 3.2 Security headers (repetidos aqui pois add_header filho suprime o do pai)
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;

            # ============================================================
            # 4.1 CACHE DE GET por 10 segundos
            # Não faz cache se houver header Authorization (autenticado)
            # ============================================================
            proxy_cache            api_cache;
            proxy_cache_methods    GET HEAD;
            proxy_cache_valid      200 10s;
            proxy_cache_valid      500 5s;
            proxy_cache_key        "$request_method$host$request_uri";
            proxy_cache_bypass     $http_authorization;
            proxy_no_cache         $http_authorization;
            proxy_ignore_headers   Cache-Control Expires Set-Cookie;
            add_header             X-Cache-Status $upstream_cache_status always;

            # Proxy reverso para o backend
            proxy_pass http://minierp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header Connection         "";

            # Buffering habilitado para permitir GZIP em respostas proxied
            proxy_buffering        on;
            proxy_buffer_size      16k;
            proxy_buffers          4 16k;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # Rota raiz - página de status
        location = / {
            return 200 "CaixaVerso MiniERP - Nginx Reverse Proxy OK\nAPI: http://localhost/api\nHealth: http://localhost/health\n";
            add_header Content-Type text/plain;
        }

        # Nega acesso a arquivos sensíveis
        location ~ /\. {
            deny all;
        }

        # Páginas de erro customizadas
        error_page 413 /413.json;
        location = /413.json {
            internal;
            return 413 '{"error":"Payload Too Large","message":"O tamanho maximo permitido e 1MB"}';
            add_header Content-Type application/json;
        }

        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"error":"Too Many Requests","message":"Limite de requisicoes excedido. Tente novamente em instantes."}';
            add_header Content-Type application/json;
        }

        error_page 500 502 503 504 /5xx.json;
        location = /5xx.json {
            internal;
            return 502 '{"error":"Bad Gateway","message":"Servico temporariamente indisponivel"}';
            add_header Content-Type application/json;
        }
    }

    # ============================================================
    # 4.3 SERVIDOR HTTPS (simulado - certificado autoassinado)
    # Configuração preparada para produção com TLS 1.2/1.3
    # ============================================================
    server {
        listen 443 ssl;
        server_name localhost;

        # Certificado autoassinado gerado no Dockerfile
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Apenas TLS 1.2 e 1.3 (seguro)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        limit_conn conn_limit 20;

        # 3.2 HEADERS DE SEGURANÇA
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "DENY"          always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /health {
            access_log off;
            add_header Content-Type text/plain always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            return 200 "healthy\n";
        }

        location ~ ^/api/actuator(/.*)?$ {
            auth_basic           "Area Restrita";
            auth_basic_user_file /etc/nginx/.htpasswd;

            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://minierp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header Connection         "";

            proxy_buffering     on;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }

        location ~ ^/api/(swagger-ui\.html|swagger-ui|v3/api-docs|swagger-resources|webjars)(/.*)?$ {
            limit_req zone=api_limit burst=10 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

            proxy_pass http://minierp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_set_header Connection         "";

            proxy_buffering     on;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }

        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            # 3.2 Security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

            proxy_cache         api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid   200 10s;
            proxy_cache_key     "$request_method$host$request_uri";
            proxy_cache_bypass  $http_authorization;
            proxy_no_cache      $http_authorization;
            add_header          X-Cache-Status $upstream_cache_status always;

            proxy_pass http://minierp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header Connection         "";
        }
    }
}
